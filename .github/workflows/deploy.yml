name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create .env from secrets
        run: |
          {
            echo "VITE_FB_API_KEY=$VITE_FB_API_KEY"
            echo "VITE_FB_AUTH_DOMAIN=$VITE_FB_AUTH_DOMAIN"
            echo "VITE_FB_PROJECT_ID=$VITE_FB_PROJECT_ID"
            echo "VITE_FB_STORAGE_BUCKET=$VITE_FB_STORAGE_BUCKET"
            echo "VITE_FB_MESSAGING_SENDER_ID=$VITE_FB_MESSAGING_SENDER_ID"
            echo "VITE_FB_APP_ID=$VITE_FB_APP_ID"
            echo "VITE_FB_RTDB_URL=$VITE_FB_RTDB_URL"
          } > .env
        env:
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_FB_RTDB_URL: ${{ secrets.VITE_FB_RTDB_URL }}

      - run: npm ci
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: surucu.kayseriparkavmtaksi.com
